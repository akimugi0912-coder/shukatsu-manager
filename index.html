<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>就活マネージャー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F6F2;--surface:#FFFFFF;--surface2:#F0EFE9;
  --border:rgba(0,0,0,0.08);--border-md:rgba(0,0,0,0.14);
  --text:#1A1916;--text-sub:#6B6A65;--text-hint:#A8A79F;
  --blue:#2563EB;--blue-bg:#EFF4FF;--blue-text:#1D4ED8;
  --red:#DC2626;--red-bg:#FEF2F2;--red-text:#B91C1C;
  --amber:#D97706;--amber-bg:#FFFBEB;--amber-text:#92400E;
  --green:#059669;--green-bg:#ECFDF5;--green-text:#065F46;
  --purple:#7C3AED;--purple-bg:#F5F3FF;--purple-text:#5B21B6;
  --radius:10px;--radius-lg:14px;--radius-xl:20px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08);
  --tab-h:60px;--top-h:52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}

/* ===== PC layout ===== */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 1rem;position:fixed;top:0;left:0;bottom:0;z-index:10}
.logo{font-weight:700;font-size:15px;color:var(--text);padding:0 .5rem 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1.25rem;display:flex;align-items:center;gap:8px}
.logo-icon{width:28px;height:28px;background:var(--text);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:14px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;color:var(--text-sub);font-size:13px;font-weight:500;transition:all .15s;border:none;background:transparent;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--text);color:white}
.nav-icon{font-size:15px;width:20px;text-align:center}
.sidebar-footer{margin-top:auto;padding-top:1rem;border-top:1px solid var(--border)}
.sidebar-stats{font-size:11px;color:var(--text-hint);padding:0 .5rem}
.sidebar-stat{display:flex;justify-content:space-between;margin-bottom:4px}
.sidebar-stat-val{font-weight:700;font-family:'DM Mono',monospace;color:var(--text-sub)}
.main{margin-left:220px;flex:1;padding:2rem;max-width:calc(100% - 220px)}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.5px}
.header-actions{display:flex;gap:8px;flex-wrap:wrap}

/* ===== Mobile top bar ===== */
.mobile-topbar{display:none;position:fixed;top:0;left:0;right:0;height:var(--top-h);background:var(--surface);border-bottom:1px solid var(--border);z-index:50;align-items:center;justify-content:space-between;padding:0 1rem}
.mobile-logo{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
.mobile-logo-icon{width:26px;height:26px;background:var(--text);border-radius:7px;display:flex;align-items:center;justify-content:center;color:white;font-size:13px}
.hamburger{background:none;border:none;cursor:pointer;font-size:22px;color:var(--text);padding:4px}
.mobile-add-btn{background:var(--text);color:white;border:none;border-radius:var(--radius);padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}

/* ===== Drawer ===== */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:60}
.drawer-overlay.open{display:block}
.drawer{position:fixed;top:0;left:-300px;width:280px;bottom:0;background:var(--surface);z-index:70;transition:left .25s ease;padding:1.25rem 1rem;display:flex;flex-direction:column;box-shadow:var(--shadow-md)}
.drawer.open{left:0}
.drawer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.drawer-logo{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
.drawer-close{background:var(--surface2);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text-sub)}
.drawer-nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--radius);cursor:pointer;color:var(--text-sub);font-size:14px;font-weight:500;transition:all .15s;border:none;background:transparent;width:100%;text-align:left;margin-bottom:2px}
.drawer-nav-item:hover{background:var(--surface2);color:var(--text)}
.drawer-nav-item.active{background:var(--text);color:white}
.drawer-divider{height:1px;background:var(--border);margin:10px 0}
.drawer-footer-stats{margin-top:auto;padding-top:1rem;border-top:1px solid var(--border);font-size:11px;color:var(--text-hint)}
.drawer-stat{display:flex;justify-content:space-between;margin-bottom:4px}
.drawer-stat-val{font-weight:700;font-family:'DM Mono',monospace;color:var(--text-sub)}

/* ===== Bottom tab bar ===== */
.mobile-tabbar{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:var(--surface);border-top:1px solid var(--border);z-index:50;justify-content:space-around;align-items:center;padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 20px;border:none;background:transparent;cursor:pointer;color:var(--text-hint);font-size:10px;font-family:inherit;font-weight:500;transition:color .15s;-webkit-tap-highlight-color:transparent}
.tab-btn.active{color:var(--blue)}
.tab-btn-icon{font-size:22px;line-height:1}

/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn-primary{background:var(--text);color:white}.btn-primary:hover{background:#333}
.btn-outline{background:transparent;border:1px solid var(--border-md);color:var(--text-sub)}.btn-outline:hover{background:var(--surface2)}
.btn-danger{background:var(--red-bg);color:var(--red-text);border:1px solid transparent}.btn-danger:hover{background:#fee2e2}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow)}
.stat-label{font-size:10px;color:var(--text-hint);font-weight:500;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.stat-num{font-size:24px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-1px}

/* Views */
.view{display:none}.view.active{display:block}

/* Calendar */
.cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:1.25rem;box-shadow:var(--shadow)}
.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.cal-month-nav{display:flex;align-items:center;gap:10px}
.cal-month-label{font-size:16px;font-weight:700;min-width:110px}
.cal-nav-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.cal-nav-btn:active{background:var(--border-md)}
.legend{display:flex;gap:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-sub)}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cal-grid-header{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));margin-bottom:4px}
.cal-day-name{text-align:center;font-size:11px;font-weight:500;color:var(--text-hint);padding:4px 0}
.cal-day-name:first-child{color:#EF4444}.cal-day-name:last-child{color:var(--blue)}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px}
.cal-cell{background:var(--surface2);border-radius:8px;padding:5px 4px;cursor:pointer;border:1.5px solid transparent;transition:border-color .15s;-webkit-tap-highlight-color:transparent;min-height:56px}
.cal-cell:active{border-color:var(--border-md)}
.cal-cell.other-month{opacity:.25;pointer-events:none}
.cal-cell.today{border-color:var(--blue)}.cal-cell.today .cal-date{color:var(--blue);font-weight:700}
.cal-date{font-size:12px;font-weight:500;color:var(--text-sub);margin-bottom:2px;font-family:'DM Mono',monospace;text-align:center}
.cal-dot{font-size:0;width:6px;height:6px;border-radius:50%;margin:1px auto;display:block}
.t-interview{background:var(--blue)}
.t-seminar{background:var(--purple)}
.t-deadline{background:var(--red)}
.t-exam{background:var(--amber)}
.t-other{background:var(--green)}
.cal-dot-label{font-size:8px;padding:1px 3px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:block;font-weight:500}

/* Company */
.company-grid{display:flex;flex-direction:column;gap:8px}
.company-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.company-card:active{background:var(--surface2)}
.company-avatar{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.company-info{flex:1;min-width:0}
.company-name{font-size:14px;font-weight:600}
.company-meta{font-size:12px;color:var(--text-sub);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.company-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}

/* Badges */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px}
.s-considering{background:var(--purple-bg);color:var(--purple-text)}
.s-applied{background:var(--blue-bg);color:var(--blue-text)}
.s-exam{background:var(--amber-bg);color:var(--amber-text)}
.s-interview{background:var(--green-bg);color:var(--green-text)}
.s-offer{background:#F0FDF4;color:#14532D}
.s-rejected{background:var(--red-bg);color:var(--red-text)}

/* Reminders */
.reminder-grid{display:flex;flex-direction:column;gap:8px}
.reminder-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;display:flex;align-items:flex-start;gap:12px;box-shadow:var(--shadow);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.reminder-card:active{background:var(--surface2)}
.reminder-date-box{min-width:48px;text-align:center;border-radius:var(--radius);padding:6px 4px;flex-shrink:0}
.r-month{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.r-day{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;margin-top:2px}
.reminder-body{flex:1;min-width:0}
.reminder-title{font-size:14px;font-weight:600}
.reminder-company{font-size:12px;color:var(--text-sub);margin-top:2px}
.reminder-memo{font-size:11px;color:var(--text-hint);margin-top:4px;font-style:italic;border-left:2px solid var(--border);padding-left:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reminder-actions{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.reminder-days-left{font-size:11px;font-weight:700;font-family:'DM Mono',monospace}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(10,10,10,.45);backdrop-filter:blur(2px);display:none;align-items:flex-end;justify-content:center;z-index:1000;padding:0}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:1.5rem 1.25rem;width:100%;max-width:500px;box-shadow:0 -8px 40px rgba(0,0,0,.15);max-height:92vh;overflow-y:auto}
.cmodal{background:var(--surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:1.5rem 1.25rem;width:100%;max-width:500px;box-shadow:0 -8px 40px rgba(0,0,0,.15);max-height:92vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border-md);border-radius:2px;margin:0 auto 1.25rem}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:var(--surface2);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text-sub)}
.form-row{margin-bottom:12px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--text-sub);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg);border:1px solid var(--border-md);border-radius:var(--radius);padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);transition:border-color .15s;-webkit-appearance:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-textarea{height:72px;resize:none}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border)}
.cmodal-header{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.cmodal-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.cmodal-title{font-size:17px;font-weight:700;flex:1}
.cmodal-section{margin-bottom:1.1rem}
.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-hint);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.pw-wrap{position:relative}
.pw-wrap .form-input{padding-right:40px}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-hint);font-size:14px;padding:4px}
.event-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.event-row:last-child{border-bottom:none}
.event-row-date{font-size:11px;font-family:'DM Mono',monospace;color:var(--text-sub);min-width:80px;flex-shrink:0}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--text-hint)}
.empty-state-icon{font-size:36px;margin-bottom:10px}
.empty-state-text{font-size:13px;line-height:1.8}
.icon-btn{background:transparent;border:none;cursor:pointer;color:var(--text-hint);font-size:15px;padding:6px;border-radius:6px;transition:all .15s;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.icon-btn:active{color:var(--red-text);background:var(--red-bg)}
.ev-detail-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:1.25rem}
.ev-detail-type-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ev-detail-meta{flex:1}
.ev-detail-company{font-size:17px;font-weight:700;margin-bottom:3px}
.ev-detail-type{font-size:13px;color:var(--text-sub)}
.ev-detail-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.ev-detail-row:last-child{border-bottom:none}
.ev-detail-label{font-size:11px;font-weight:600;color:var(--text-hint);text-transform:uppercase;letter-spacing:.4px;min-width:64px;padding-top:1px;flex-shrink:0}
.ev-detail-value{font-size:13px;color:var(--text);flex:1;word-break:break-all}
.ev-detail-memo{font-size:13px;color:var(--text-sub);line-height:1.7;white-space:pre-wrap}
.toast{position:fixed;bottom:calc(var(--tab-h) + 12px);left:1rem;right:1rem;background:var(--text);color:white;border-radius:var(--radius);padding:12px 18px;font-size:13px;font-weight:500;text-align:center;box-shadow:var(--shadow-md);transform:translateY(10px);opacity:0;transition:all .25s;z-index:3000;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

/* ===== PC overrides ===== */
@media(min-width:769px){
  .mobile-topbar,.mobile-tabbar,.drawer,.drawer-overlay{display:none!important}
  .modal-overlay{align-items:center;padding:1rem}
  .modal,.cmodal{border-radius:var(--radius-xl);max-width:460px}
  .modal-handle{display:none}
  .toast{bottom:24px;left:auto;right:24px;text-align:left}
}

/* ===== Mobile overrides ===== */
@media(max-width:768px){
  .sidebar{display:none}
  .mobile-topbar{display:flex}
  .mobile-tabbar{display:flex}
  .page-header{display:none}
  .main{margin-left:0;max-width:100%;padding:.75rem;padding-top:calc(var(--top-h) + .75rem);padding-bottom:calc(var(--tab-h) + .75rem)}
  .stats-grid{grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-bottom:.875rem}
  .stat-card{padding:8px 6px}
  .stat-label{font-size:8px}
  .stat-num{font-size:17px}
  .cal-wrap{padding:.75rem;border-radius:var(--radius-lg)}
  .cal-month-label{font-size:14px;min-width:90px}
  .legend{gap:6px}
  .legend-item{font-size:9px}
  .form-row-2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">

  <!-- PC Sidebar -->
  <aside class="sidebar">
    <div class="logo"><div class="logo-icon">就</div>就活マネージャー</div>
    <nav style="display:flex;flex-direction:column;gap:4px">
      <button class="nav-item active" onclick="switchView('calendar',this)"><span class="nav-icon">📅</span><span>カレンダー</span></button>
      <button class="nav-item" onclick="switchView('companies',this)"><span class="nav-icon">🏢</span><span>企業一覧</span></button>
      <button class="nav-item" onclick="switchView('reminders',this)"><span class="nav-icon">🔔</span><span>今後の予定</span></button>
    </nav>
    <div class="sidebar-footer"><div class="sidebar-stats" id="sidebar-stats"></div></div>
  </aside>

  <!-- Mobile top bar -->
  <div class="mobile-topbar">
    <button class="hamburger" id="hamburger-btn">☰</button>
    <div class="mobile-logo"><div class="mobile-logo-icon">就</div>就活マネージャー</div>
    <button class="mobile-add-btn" id="mobile-add-btn">＋ 追加</button>
  </div>

  <!-- Drawer -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-logo"><div class="mobile-logo-icon">就</div>就活マネージャー</div>
      <button class="drawer-close" id="drawer-close">✕</button>
    </div>
    <button class="drawer-nav-item active" id="dnav-calendar" onclick="switchViewMobile('calendar')"><span style="font-size:18px">📅</span><span>カレンダー</span></button>
    <button class="drawer-nav-item" id="dnav-companies" onclick="switchViewMobile('companies')"><span style="font-size:18px">🏢</span><span>企業一覧</span></button>
    <button class="drawer-nav-item" id="dnav-reminders" onclick="switchViewMobile('reminders')"><span style="font-size:18px">🔔</span><span>今後の予定</span></button>
    <div class="drawer-divider"></div>
    <button class="drawer-nav-item" onclick="closeDrawer();setTimeout(openAddCoModal,100)"><span style="font-size:18px">🏢</span><span>企業を追加</span></button>
    <button class="drawer-nav-item" onclick="closeDrawer();setTimeout(()=>openEventModal(),100)"><span style="font-size:18px">📝</span><span>予定を追加</span></button>
    <div class="drawer-footer-stats" id="drawer-stats"></div>
  </div>

  <!-- Bottom tab bar -->
  <nav class="mobile-tabbar">
    <button class="tab-btn active" id="tab-calendar" onclick="switchViewMobile('calendar')">
      <span class="tab-btn-icon">📅</span><span>カレンダー</span>
    </button>
    <button class="tab-btn" id="tab-companies" onclick="switchViewMobile('companies')">
      <span class="tab-btn-icon">🏢</span><span>企業</span>
    </button>
    <button class="tab-btn" id="tab-reminders" onclick="switchViewMobile('reminders')">
      <span class="tab-btn-icon">🔔</span><span>予定</span>
    </button>
  </nav>

  <!-- Main -->
  <main class="main">
    <div class="page-header">
      <h1 class="page-title" id="page-title">カレンダー</h1>
      <div class="header-actions" id="header-actions"></div>
    </div>
    <div class="stats-grid" id="stats-grid"></div>

    <div class="view active" id="view-calendar">

<script>
(function(){
  const DAYS=['日','月','火','水','木','金','土'];
  const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const TYPE_LABELS={interview:'面接',seminar:'説明会',deadline:'締切',exam:'筆記試験',other:'その他'};
  const STATUS_LABELS={considering:'検討中',applied:'応募済み',exam:'筆記試験',interview:'面接中',offer:'内定',rejected:'不合格'};
  const AVATAR_COLORS=[
    {bg:'#DBEAFE',c:'#1D4ED8'},{bg:'#D1FAE5',c:'#065F46'},{bg:'#FEF3C7',c:'#92400E'},
    {bg:'#EDE9FE',c:'#5B21B6'},{bg:'#FCE7F3',c:'#9D174D'},{bg:'#FEE2E2',c:'#B91C1C'},
  ];
  const TYPE_STYLE={
    interview:{bg:'#EFF4FF',c:'#1D4ED8'},seminar:{bg:'#F5F3FF',c:'#5B21B6'},
    deadline:{bg:'#FEF2F2',c:'#B91C1C'},exam:{bg:'#FFFBEB',c:'#92400E'},other:{bg:'#ECFDF5',c:'#065F46'}
  };
  const TYPE_ICONS={interview:'🤝',seminar:'📢',deadline:'📋',exam:'📝',other:'📌'};
  const TYPE_COLORS={interview:'var(--blue)',seminar:'var(--purple)',deadline:'var(--red)',exam:'var(--amber)',other:'var(--green)'};

  let curYear=new Date().getFullYear(),curMonth=new Date().getMonth();
  let currentView='calendar';
  let editEventId=null,currentCo=null;

  function loadJ(k,d){try{return JSON.parse(localStorage.getItem(k)||'null')||d;}catch{return d;}}
  function saveJ(k,v){localStorage.setItem(k,JSON.stringify(v));}

  let events=loadJ('shukatsu_events',[]);
  let coInfo=loadJ('shukatsu_companies',{});

  if(!events.length&&!Object.keys(coInfo).length){
    const add=d=>{const t=new Date();t.setDate(t.getDate()+d);return t.toISOString().slice(0,10);};
    events=[
      {id:1,company:'○○商事',type:'interview',date:add(5),time:'10:00',status:'interview',memo:'一次面接。スーツ着用、受付3F。'},
      {id:2,company:'△△テック',type:'deadline',date:add(8),time:'',status:'applied',memo:'エントリーシート提出期限'},
      {id:3,company:'□□銀行',type:'exam',date:add(11),time:'13:00',status:'exam',memo:'会場：千代田区○○ビル5F'},
      {id:4,company:'○○商事',type:'interview',date:add(21),time:'14:00',status:'interview',memo:'二次面接（役員）'},
      {id:5,company:'××食品',type:'seminar',date:add(3),time:'15:00',status:'considering',memo:'会社説明会（Zoom）'},
    ];
    saveJ('shukatsu_events',events);
  }
  let nextId=events.length?Math.max(...events.map(e=>e.id))+1:1;

  function todayStr(){return new Date().toISOString().slice(0,10);}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function allNames(){const s=new Set();events.forEach(e=>s.add(e.company));Object.keys(coInfo).forEach(k=>s.add(k));return[...s].sort();}
  function coStatus(n){if(coInfo[n]?.status)return coInfo[n].status;const ev=events.filter(e=>e.company===n);return ev.length?ev[ev.length-1].status:'considering';}

  /* Drawer */
  function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('open');}
  function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');}
  window.closeDrawer=closeDrawer;
  window.openAddCoModal=()=>openAddCoModal();
  window.openEventModal=()=>openEventModal();

  /* View switch */
  function switchView(view,btn){
    currentView=view;
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    if(btn)btn.classList.add('active');
    document.getElementById('view-'+view).classList.add('active');
    const titles={calendar:'カレンダー',companies:'企業一覧',reminders:'今後の予定'};
    document.getElementById('page-title').textContent=titles[view];
    renderAll();
  }
  function switchViewMobile(view){
    currentView=view;
    document.querySelectorAll('.drawer-nav-item').forEach(n=>n.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(n=>n.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-'+view).classList.add('active');
    const tab=document.getElementById('tab-'+view);
    const dnav=document.getElementById('dnav-'+view);
    if(tab)tab.classList.add('active');
    if(dnav)dnav.classList.add('active');
    closeDrawer();
    renderAll();
  }
  window.switchView=switchView;
  window.switchViewMobile=switchViewMobile;

  /* Render */
  function renderAll(){
    renderStats();renderSidebarStats();updateHeaderActions();updateDatalist();
    if(currentView==='calendar')renderCalendar();
    if(currentView==='companies')renderCompanies();
    if(currentView==='reminders')renderReminders();
  }

  function renderStats(){
    const names=allNames();
    const upcoming=events.filter(e=>e.date>=todayStr()).length;
    const offers=names.filter(n=>coStatus(n)==='offer').length;
    const interviews=names.filter(n=>coStatus(n)==='interview').length;
    document.getElementById('stats-grid').innerHTML=[
      {label:'登録企業',val:names.length,sub:'社'},
      {label:'面接中',val:interviews,sub:'社'},
      {label:'内定',val:offers,sub:'社'},
      {label:'今後',val:upcoming,sub:'件'},
    ].map(s=>`<div class="stat-card">
      <div class="stat-label">${s.label}</div>
      <div class="stat-num">${s.val}<span style="font-size:11px;font-weight:400;color:var(--text-hint);font-family:inherit">${s.sub}</span></div>
    </div>`).join('');
  }

  function renderSidebarStats(){
    const names=allNames();
    const upcoming=events.filter(e=>e.date>=todayStr()).length;
    const rows=[['登録企業',names.length+'社'],['今後の予定',upcoming+'件']];
    document.getElementById('sidebar-stats').innerHTML=rows.map(([l,v])=>`<div class="sidebar-stat"><span>${l}</span><span class="sidebar-stat-val">${v}</span></div>`).join('');
    const ds=document.getElementById('drawer-stats');
    if(ds)ds.innerHTML=rows.map(([l,v])=>`<div class="drawer-stat"><span>${l}</span><span class="drawer-stat-val">${v}</span></div>`).join('');
  }

  function updateHeaderActions(){
    const el=document.getElementById('header-actions');
    if(currentView==='companies'){
      el.innerHTML=`<button class="btn btn-outline" id="btn-add-co">＋ 企業を追加</button><button class="btn btn-primary" id="btn-add-ev">＋ 予定を追加</button>`;
      document.getElementById('btn-add-co').addEventListener('click',openAddCoModal);
      document.getElementById('btn-add-ev').addEventListener('click',()=>openEventModal());
    } else {
      el.innerHTML=`<button class="btn btn-primary" id="btn-add-ev">＋ 予定を追加</button>`;
      document.getElementById('btn-add-ev').addEventListener('click',()=>openEventModal());
    }
  }

  function updateDatalist(){
    const dl=document.getElementById('co-datalist');
    if(dl)dl.innerHTML=allNames().map(n=>`<option value="${esc(n)}">`).join('');
  }

  /* Calendar */
  function renderCalendar(){
    document.getElementById('cal-month-label').textContent=`${curYear}年 ${MONTHS[curMonth]}`;
    document.getElementById('cal-grid-header').innerHTML=DAYS.map(d=>`<div class="cal-day-name">${d}</div>`).join('');
    const first=new Date(curYear,curMonth,1).getDay();
    const dim=new Date(curYear,curMonth+1,0).getDate();
    const prev=new Date(curYear,curMonth,0).getDate();
    const cells=[];
    for(let i=0;i<first;i++)cells.push({d:prev-first+1+i,cur:false});
    for(let i=1;i<=dim;i++)cells.push({d:i,cur:true});
    while(cells.length<42)cells.push({d:cells.length-dim-first+1,cur:false});
    const td=new Date();
    const mobile=window.innerWidth<=768;
    const grid=document.getElementById('cal-grid');
    grid.innerHTML=cells.map(c=>{
      const isToday=c.cur&&c.d===td.getDate()&&curYear===td.getFullYear()&&curMonth===td.getMonth();
      const ds=c.cur?`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(c.d).padStart(2,'0')}`:'';
      const dayEvs=c.cur?events.filter(e=>e.date===ds):[];
      let dots='';
      if(mobile){
        dots=dayEvs.slice(0,3).map(e=>`<span class="cal-dot t-${e.type}"></span>`).join('');
      } else {
        dots=dayEvs.slice(0,2).map(e=>`<span class="cal-dot-label t-${e.type}">${TYPE_LABELS[e.type]}</span>`).join('');
      }
      return`<div class="cal-cell${c.cur?'':' other-month'}${isToday?' today':''}" data-ds="${ds}"><div class="cal-date">${c.d}</div>${dots}</div>`;
    }).join('');
    grid.querySelectorAll('.cal-cell[data-ds]').forEach(el=>{
      const ds=el.dataset.ds;
      if(!ds)return;
      el.addEventListener('click',()=>{
        const dayEvs=events.filter(e=>e.date===ds);
        if(dayEvs.length===1)openEvDetail(dayEvs[0].id);
        else if(dayEvs.length>1)openDayList(ds,dayEvs);
        else openEventModal(ds);
      });
    });
  }

  /* Companies */
  function renderCompanies(){
    const names=allNames();
    if(!names.length){
      document.getElementById('company-grid').innerHTML=`<div class="empty-state"><div class="empty-state-icon">🏢</div><div class="empty-state-text">まだ企業が登録されていません。<br>「＋ 追加」または「企業を追加」から登録できます。</div></div>`;
      return;
    }
    document.getElementById('company-grid').innerHTML=names.map((name,i)=>{
      const clr=AVATAR_COLORS[i%AVATAR_COLORS.length];
      const status=coStatus(name);
      const upcoming=events.filter(e=>e.company===name&&e.date>=todayStr()).sort((a,b)=>a.date.localeCompare(b.date));
      const next=upcoming[0];
      const sub=next?`次：${next.date} ${TYPE_LABELS[next.type]}${next.time?' '+next.time:''}`:'今後の予定なし';
      const info=coInfo[name]||{};
      const hasInfo=info.url||info.login||info.note;
      return`<div class="company-card" data-name="${esc(name)}" data-idx="${i}">
        <div class="company-avatar" style="background:${clr.bg};color:${clr.c}">${esc(name.slice(0,2))}</div>
        <div class="company-info"><div class="company-name">${esc(name)}</div><div class="company-meta">${esc(sub)}</div></div>
        <div class="company-actions">
          ${hasInfo?'<span style="font-size:12px;color:var(--text-hint)">🔑</span>':''}
          <span class="badge s-${status}">${STATUS_LABELS[status]}</span>
          <span style="font-size:13px;color:var(--text-hint);margin-left:2px">›</span>
        </div>
      </div>`;
    }).join('');
    document.querySelectorAll('.company-card').forEach(card=>{
      card.addEventListener('click',()=>openCoDetail(card.dataset.name,parseInt(card.dataset.idx)));
    });
  }

  /* Reminders */
  function renderReminders(){
    const upcoming=events.filter(e=>e.date>=todayStr()).sort((a,b)=>a.date.localeCompare(b.date));
    if(!upcoming.length){
      document.getElementById('reminder-grid').innerHTML=`<div class="empty-state"><div class="empty-state-icon">🔔</div><div class="empty-state-text">今後の予定はありません。</div></div>`;
      return;
    }
    document.getElementById('reminder-grid').innerHTML=upcoming.map(e=>{
      const[,m,d]=e.date.split('-');
      const diff=Math.ceil((new Date(e.date)-new Date(todayStr()))/86400000);
      const diffText=diff===0?'今日':diff===1?'明日':`${diff}日後`;
      const diffColor=diff<=3?'var(--red)':diff<=7?'var(--amber)':'var(--text-hint)';
      const st=TYPE_STYLE[e.type]||TYPE_STYLE.other;
      return`<div class="reminder-card" data-evid="${e.id}">
        <div class="reminder-date-box" style="background:${st.bg};color:${st.c}">
          <div class="r-month">${MONTHS[parseInt(m)-1]}</div>
          <div class="r-day">${parseInt(d)}</div>
        </div>
        <div class="reminder-body">
          <div class="reminder-title">${TYPE_LABELS[e.type]}${e.time?' · '+e.time:''}</div>
          <div class="reminder-company">${esc(e.company)} · <span class="badge s-${e.status}" style="font-size:10px;padding:1px 6px">${STATUS_LABELS[e.status]}</span></div>
          ${e.memo?`<div class="reminder-memo">${esc(e.memo)}</div>`:''}
        </div>
        <div class="reminder-actions">
          <span class="reminder-days-left" style="color:${diffColor}">${diffText}</span>
          <button class="icon-btn" data-edit="${e.id}" title="編集">✏️</button>
          <button class="icon-btn" data-del="${e.id}" title="削除">🗑</button>
        </div>
      </div>`;
    }).join('');
    document.querySelectorAll('.reminder-card[data-evid]').forEach(card=>{
      card.addEventListener('click',()=>openEvDetail(parseInt(card.dataset.evid)));
    });
    document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',ev=>{ev.stopPropagation();openEventModal(null,parseInt(b.dataset.edit));}));
    document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',ev=>{ev.stopPropagation();deleteEvent(parseInt(b.dataset.del));}));
  }

  /* Event modal */
  function openEventModal(dateStr,editId){
    editEventId=editId||null;
    document.getElementById('event-modal-title').textContent=editId?'予定を編集':'予定を追加';
    if(editId){
      const ev=events.find(e=>e.id===editId);
      if(!ev)return;
      document.getElementById('f-company').value=ev.company;
      document.getElementById('f-type').value=ev.type;
      document.getElementById('f-date').value=ev.date;
      document.getElementById('f-time').value=ev.time||'';
      document.getElementById('f-status').value=ev.status;
      document.getElementById('f-memo').value=ev.memo||'';
    } else {
      document.getElementById('f-company').value='';
      document.getElementById('f-type').value='interview';
      document.getElementById('f-date').value=dateStr||todayStr();
      document.getElementById('f-time').value='';
      document.getElementById('f-status').value='considering';
      document.getElementById('f-memo').value='';
    }
    document.getElementById('event-modal-overlay').classList.add('open');
  }
  function closeEventModal(){document.getElementById('event-modal-overlay').classList.remove('open');}

  function saveEvent(){
    const company=document.getElementById('f-company').value.trim();
    const date=document.getElementById('f-date').value;
    if(!company){alert('企業名を入力してください');return;}
    if(!date){alert('日付を入力してください');return;}
    const ev={id:editEventId||nextId++,company,type:document.getElementById('f-type').value,date,time:document.getElementById('f-time').value,status:document.getElementById('f-status').value,memo:document.getElementById('f-memo').value.trim()};
    if(editEventId){const i=events.findIndex(e=>e.id===editEventId);if(i>=0)events[i]=ev;}
    else events.push(ev);
    saveJ('shukatsu_events',events);
    closeEventModal();showToast(editEventId?'更新しました':'追加しました');renderAll();
  }

  function deleteEvent(id){
    if(!confirm('この予定を削除しますか？'))return;
    events=events.filter(e=>e.id!==id);
    saveJ('shukatsu_events',events);showToast('削除しました');renderAll();
  }

  /* Event detail */
  function openEvDetail(id,fromDayList){
    document.getElementById('evd-delete').style.display='';
    document.getElementById('evd-add-same-day').style.display='';
    document.getElementById('evd-edit').textContent='✏️ 編集する';
    document.getElementById('evd-modal-title').textContent='予定の詳細';
    const backBtn=document.getElementById('evd-back');
    if(fromDayList){
      backBtn.style.display='';
      backBtn.onclick=()=>{closeEvDetail();openDayList(fromDayList,events.filter(e=>e.date===fromDayList));};
    } else {
      backBtn.style.display='none';
    }
    const ev=events.find(e=>e.id===id);
    if(!ev)return;
    const st=TYPE_STYLE[ev.type]||TYPE_STYLE.other;
    const icon=document.getElementById('evd-icon');
    icon.textContent=TYPE_ICONS[ev.type]||'📌';
    icon.style.background=st.bg;icon.style.color=st.c;
    document.getElementById('evd-company').textContent=ev.company;
    document.getElementById('evd-type-badge').innerHTML=
      `<span class="cal-dot-label t-${ev.type}" style="display:inline;padding:2px 8px;font-size:11px;border-radius:5px">${TYPE_LABELS[ev.type]}</span>
       <span class="badge s-${ev.status}" style="margin-left:6px;font-size:11px">${STATUS_LABELS[ev.status]}</span>`;
    const diff=Math.ceil((new Date(ev.date)-new Date(todayStr()))/86400000);
    const diffText=diff<0?`${Math.abs(diff)}日前`:diff===0?'今日':diff===1?'明日':`${diff}日後`;
    const diffColor=diff<0?'var(--text-hint)':diff<=3?'var(--red)':diff<=7?'var(--amber)':'var(--green)';
    const rows=[
      {label:'日付',value:`${ev.date}${ev.time?' '+ev.time:''} <span style="font-size:11px;font-weight:700;color:${diffColor};margin-left:6px">${diffText}</span>`},
      {label:'ステータス',value:STATUS_LABELS[ev.status]||ev.status},
      ev.memo?{label:'メモ',value:`<span class="ev-detail-memo">${esc(ev.memo)}</span>`}:null,
    ].filter(Boolean);
    document.getElementById('evd-rows').innerHTML=rows.map(r=>`<div class="ev-detail-row"><span class="ev-detail-label">${r.label}</span><span class="ev-detail-value">${r.value}</span></div>`).join('');
    document.getElementById('evd-delete').onclick=()=>{
      if(!confirm('この予定を削除しますか？'))return;
      events=events.filter(e=>e.id!==id);
      saveJ('shukatsu_events',events);closeEvDetail();showToast('削除しました');renderAll();
    };
    document.getElementById('evd-edit').onclick=()=>{closeEvDetail();openEventModal(null,id);};
    document.getElementById('evd-add-same-day').onclick=()=>{closeEvDetail();openEventModal(ev.date);};
    document.getElementById('evdetail-modal-overlay').classList.add('open');
  }
  function closeEvDetail(){document.getElementById('evdetail-modal-overlay').classList.remove('open');}

  function openDayList(ds,dayEvs){
    const[,m,d]=ds.split('-');
    document.getElementById('evd-icon').textContent='📅';
    document.getElementById('evd-icon').style.background='var(--surface2)';
    document.getElementById('evd-icon').style.color='var(--text-sub)';
    document.getElementById('evd-company').textContent=`${parseInt(m)}月${parseInt(d)}日`;
    document.getElementById('evd-type-badge').textContent=`${dayEvs.length}件の予定`;
    document.getElementById('evd-modal-title').textContent='予定一覧';
    document.getElementById('evd-back').style.display='none';
    document.getElementById('evd-rows').innerHTML=dayEvs.map(e=>{
      const st=TYPE_STYLE[e.type]||TYPE_STYLE.other;
      return`<div class="ev-detail-row" style="cursor:pointer" data-dayev="${e.id}">
        <span style="width:36px;height:36px;border-radius:10px;background:${st.bg};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${TYPE_ICONS[e.type]||'📌'}</span>
        <span style="flex:1;min-width:0">
          <span style="font-size:13px;font-weight:600;display:block">${esc(e.company)}</span>
          <span style="font-size:11px;color:var(--text-sub)">${TYPE_LABELS[e.type]}${e.time?' · '+e.time:''}</span>
        </span>
        <span style="font-size:13px;color:var(--text-hint)">›</span>
      </div>`;
    }).join('');
    document.querySelectorAll('[data-dayev]').forEach(row=>{
      row.addEventListener('click',()=>{closeEvDetail();openEvDetail(parseInt(row.dataset.dayev),ds);});
    });
    document.getElementById('evd-delete').style.display='none';
    document.getElementById('evd-add-same-day').style.display='none';
    document.getElementById('evd-edit').textContent='＋ この日に追加';
    document.getElementById('evd-edit').style.flex='1';
    document.getElementById('evd-edit').onclick=()=>{closeEvDetail();openEventModal(ds);};
    document.getElementById('evdetail-modal-overlay').classList.add('open');
  }

  /* Add company */
  function openAddCoModal(){
    ['ac-name','ac-url','ac-login','ac-password','ac-note'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('ac-status').value='considering';
    document.getElementById('addco-modal-overlay').classList.add('open');
  }
  function closeAddCoModal(){document.getElementById('addco-modal-overlay').classList.remove('open');}

  function saveNewCompany(){
    const name=document.getElementById('ac-name').value.trim();
    if(!name){alert('企業名を入力してください');return;}
    coInfo[name]={status:document.getElementById('ac-status').value,url:document.getElementById('ac-url').value.trim(),login:document.getElementById('ac-login').value.trim(),password:document.getElementById('ac-password').value,note:document.getElementById('ac-note').value.trim()};
    saveJ('shukatsu_companies',coInfo);closeAddCoModal();showToast(`「${name}」を追加しました`);renderAll();
  }

  /* Company detail */
  function openCoDetail(name,colorIdx){
    currentCo=name;
    const info=coInfo[name]||{};
    const clr=AVATAR_COLORS[colorIdx%AVATAR_COLORS.length];
    const av=document.getElementById('cm-avatar');
    av.textContent=name.slice(0,2);av.style.background=clr.bg;av.style.color=clr.c;
    document.getElementById('cm-title').textContent=name;
    const sel=document.getElementById('cm-status');
    sel.innerHTML=Object.entries(STATUS_LABELS).map(([v,l])=>`<option value="${v}">${l}</option>`).join('');
    sel.value=coStatus(name);
    document.getElementById('cm-url').value=info.url||'';
    document.getElementById('cm-login').value=info.login||'';
    document.getElementById('cm-password').value=info.password||'';
    document.getElementById('cm-note').value=info.note||'';
    const evs=events.filter(e=>e.company===name).sort((a,b)=>a.date.localeCompare(b.date));
    document.getElementById('cm-events-list').innerHTML=evs.length
      ?evs.map(e=>`<div class="event-row">
          <span class="event-row-date">${e.date}${e.time?' '+e.time:''}</span>
          <span style="flex:1;font-size:12px"><span class="cal-dot-label t-${e.type}" style="display:inline;padding:1px 5px;font-size:10px">${TYPE_LABELS[e.type]}</span> ${esc(e.memo||'')}</span>
          <button class="icon-btn cm-ev-detail-btn" data-evid="${e.id}" title="詳細" style="font-size:13px;flex-shrink:0">🔍</button>
        </div>`).join('')
      :'<div style="color:var(--text-hint);font-size:13px;padding:6px 0">予定なし</div>';
    document.querySelectorAll('.cm-ev-detail-btn').forEach(b=>{
      b.addEventListener('click',e=>{e.stopPropagation();closeCoDetail();openEvDetail(parseInt(b.dataset.evid));});
    });
    document.getElementById('cdetail-modal-overlay').classList.add('open');
  }
  function closeCoDetail(){document.getElementById('cdetail-modal-overlay').classList.remove('open');currentCo=null;}

  function saveCoDetail(){
    if(!currentCo)return;
    const newStatus=document.getElementById('cm-status').value;
    coInfo[currentCo]={status:newStatus,url:document.getElementById('cm-url').value.trim(),login:document.getElementById('cm-login').value.trim(),password:document.getElementById('cm-password').value,note:document.getElementById('cm-note').value.trim()};
    saveJ('shukatsu_companies',coInfo);
    events.forEach(e=>{if(e.company===currentCo)e.status=newStatus;});
    saveJ('shukatsu_events',events);
    closeCoDetail();showToast('企業情報を保存しました');renderAll();
  }

  function deleteCompany(){
    if(!currentCo)return;
    if(!confirm(`「${currentCo}」を削除しますか？\n関連する予定も全て削除されます。`))return;
    delete coInfo[currentCo];
    events=events.filter(e=>e.company!==currentCo);
    saveJ('shukatsu_companies',coInfo);saveJ('shukatsu_events',events);
    closeCoDetail();showToast('削除しました');renderAll();
  }

  /* Toast */
  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2200);
  }

  /* Wire up */
  document.getElementById('hamburger-btn').addEventListener('click',openDrawer);
  document.getElementById('drawer-overlay').addEventListener('click',closeDrawer);
  document.getElementById('drawer-close').addEventListener('click',closeDrawer);
  document.getElementById('mobile-add-btn').addEventListener('click',()=>openEventModal());
  document.getElementById('evd-close').addEventListener('click',closeEvDetail);
  document.getElementById('evd-close2').addEventListener('click',closeEvDetail);
  document.getElementById('evdetail-modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeEvDetail();});
  document.getElementById('ev-close').addEventListener('click',closeEventModal);
  document.getElementById('ev-cancel').addEventListener('click',closeEventModal);
  document.getElementById('ev-save').addEventListener('click',saveEvent);
  document.getElementById('event-modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeEventModal();});
  document.getElementById('addco-close').addEventListener('click',closeAddCoModal);
  document.getElementById('addco-cancel').addEventListener('click',closeAddCoModal);
  document.getElementById('addco-save').addEventListener('click',saveNewCompany);
  document.getElementById('addco-modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeAddCoModal();});
  document.getElementById('ac-pw-toggle').addEventListener('click',()=>{const i=document.getElementById('ac-password');i.type=i.type==='password'?'text':'password';});
  document.getElementById('cm-close').addEventListener('click',closeCoDetail);
  document.getElementById('cm-cancel').addEventListener('click',closeCoDetail);
  document.getElementById('cm-save').addEventListener('click',saveCoDetail);
  document.getElementById('cm-delete').addEventListener('click',deleteCompany);
  document.getElementById('cdetail-modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeCoDetail();});
  document.getElementById('cm-pw-toggle').addEventListener('click',()=>{const i=document.getElementById('cm-password');i.type=i.type==='password'?'text':'password';});
  document.getElementById('btn-prev-month').addEventListener('click',()=>{curMonth--;if(curMonth<0){curMonth=11;curYear--;}renderCalendar();});
  document.getElementById('btn-next-month').addEventListener('click',()=>{curMonth++;if(curMonth>11){curMonth=0;curYear++;}renderCalendar();});

  window.addEventListener('resize',()=>{if(currentView==='calendar')renderCalendar();});
  renderAll();
})();
</script>
</body>
</html>
